<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Library | Snexz</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #F9FAFB; 
            --brand-main: #111827; 
            --text-main: #111827; 
            --text-sub: #6B7280; 
            --border: #E5E7EB; 
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-premium: 0 10px 25px -5px rgba(17, 24, 39, 0.1);
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        nav { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; padding: 10px 0 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo { height: 35px; width: auto; stroke: var(--brand-main); }
        .nav-logo polygon { fill: var(--brand-main); }
        .nav-name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; color: var(--brand-main); margin: 0; }
        
        .nav-back { font-weight: 700; color: var(--text-main); text-decoration: none; font-size: 0.95rem; padding: 10px 18px; border-radius: 8px; background: #FFF; border: 1px solid var(--border); transition: 0.2s; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); }
        .nav-back:hover { box-shadow: var(--shadow-premium); border-color: #D1D5DB; transform: translateY(-2px); }

        main { flex: 1; width: 100%; max-width: 1100px; display: flex; flex-direction: column; animation: fadeUp 0.6s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { margin-bottom: 30px; }
        .page-title { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 3rem; letter-spacing: -1px; color: var(--brand-main); margin: 0; line-height: 1.1; }
        .page-subtitle { color: var(--text-sub); font-size: 1.15rem; font-weight: 500; margin: 10px 0 0 0; }

        .filter-container { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; width: 100%; justify-content: flex-start; }
        
        .filter-btn { background: #FFF; border: 1px solid var(--border); color: var(--text-sub); font-weight: 700; font-size: 0.9rem; padding: 10px 18px; border-radius: 12px; cursor: pointer; transition: 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); }
        .filter-btn svg { width: 16px; height: 16px; stroke-width: 2.5; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .filter-btn:hover { border-color: var(--brand-main); color: var(--text-main); }
        .filter-btn.active { background: var(--brand-main); color: #FFF; border-color: var(--brand-main); }

        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-bottom: 60px; width: 100%; }
        
        .lib-card { background: #FFF; border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); text-decoration: none; display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .lib-card:hover { border-color: var(--brand-main); box-shadow: var(--shadow-premium); transform: translateY(-4px); }
        
        .card-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-logo { width: 45px; height: 45px; border-radius: 10px; object-fit: contain; border: 1px solid var(--border); padding: 5px; background: #FFF; }
        .card-title { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .card-desc { color: var(--text-sub); font-size: 0.95rem; line-height: 1.5; margin: 0 0 20px 0; flex: 1; }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #F1F5F9; padding-top: 15px; }
        .card-tags { display: flex; gap: 8px; }
        .tag { background: #F3F4F6; color: var(--text-main); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; border-radius: 6px; font-family: 'Outfit', sans-serif; }
        
        .card-arrow { color: var(--text-sub); transition: 0.2s; }
        .lib-card:hover .card-arrow { color: var(--brand-main); transform: translateX(4px); }

        .site-footer { padding: 40px 0; text-align: center; color: var(--text-sub); font-size: 0.85rem; border-top: 1px solid var(--border); width: 100%; max-width: 1100px; font-weight: 600; margin-top: auto; }
    </style>
    
    <script>
        window.va = window.va || function () { 
            (window.vaq = window.vaq || []).push(arguments); 
        };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

    <nav>
        <a href="/" class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg"><path d="M 338 100 L 863 100 L 663 300 L 843 460 L 843 540 L 663 700 L 138 700 L 338 500 L 158 340 L 158 260 Z" stroke-width="85" fill="none" stroke-linejoin="miter" stroke-linecap="butt" stroke-miterlimit="10" /><polygon points="300.5,280 430.5,280 700.5,520 570.5,520" /></svg>
            <span class="nav-name">Snexz</span>
        </a>
        <a href="/" class="nav-back"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></span> Back to Snexz</a>
    </nav>

    <main>
        <div class="page-header">
            <h1 class="page-title">Software Library</h1>
            <p class="page-subtitle">Browse our verified database of B2B SaaS architecture.</p>
        </div>

        <div class="filter-container">
            <button class="filter-btn active" onclick="filterLibrary('All')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg> All</button>
            <button class="filter-btn" onclick="filterLibrary('Construction')"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg> Construction</button>
            <button class="filter-btn" onclick="filterLibrary('Agency')"><svg viewBox="0 0 24 24"><path d="M11 21.73a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73z"></path><line x1="12" y1="22" x2="12" y2="12"></line><line x1="12" y1="12" x2="22.5" y2="6"></line><line x1="12" y1="12" x2="1.5" y2="6"></line></svg> Agency</button>
            <button class="filter-btn" onclick="filterLibrary('Medical')"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Medical</button>
            <button class="filter-btn" onclick="filterLibrary('Ecommerce')"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg> Ecommerce</button>
            <button class="filter-btn" onclick="filterLibrary('Real Estate')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Real Estate</button>
            <button class="filter-btn" onclick="filterLibrary('Legal')"><svg viewBox="0 0 24 24"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> Legal</button>
            <button class="filter-btn" onclick="filterLibrary('SaaS')"><svg viewBox="0 0 24 24"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path></svg> SaaS</button>
            <button class="filter-btn" onclick="filterLibrary('Hospitality')"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></svg> Hospitality</button>
            <button class="filter-btn" onclick="filterLibrary('Finance')"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg> Finance</button>
            <button class="filter-btn" onclick="filterLibrary('Education')"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></svg> Education</button>
            <button class="filter-btn" onclick="filterLibrary('NonProfit')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg> NonProfit</button>
        </div>

        <div class="library-grid" id="library-grid"></div>
    </main>

    <footer class="site-footer">
        <div>&copy; 2026 Snexz. All rights reserved.</div>
    </footer>

    <script>
        const softwareDatabase = [
            { id: 'hubspot', name: 'HubSpot', domain: 'hubspot.com', ind: ['Agency', 'SaaS', 'Ecommerce', 'Finance', 'Education'], desc: 'The gold standard CRM and marketing automation suite.', link: 'hubspot.html', tags: ['Sales', 'Marketing'] },
            { id: 'monday', name: 'Monday.com', domain: 'monday.com', ind: ['Agency', 'SaaS', 'Construction', 'Real Estate', 'NonProfit'], desc: 'Highly visual, customizable work OS and project tracker.', link: 'monday.html', tags: ['Project Mgmt'] },
            { id: 'shopify', name: 'Shopify', domain: 'shopify.com', ind: ['Ecommerce', 'Hospitality'], desc: 'The definitive platform for independent retail architecture.', link: 'shopify.html', tags: ['E-Commerce'] },
            { id: 'contractor-foreman', name: 'Contractor Foreman', domain: 'contractorforeman.com', ind: ['Construction'], desc: 'All-in-one management for specialty contractors.', link: 'contractor-foreman.html', tags: ['Construction'] },
            { id: 'quickbooks', name: 'QuickBooks', domain: 'quickbooks.intuit.com', ind: ['Construction', 'Agency', 'Medical', 'Ecommerce', 'Real Estate', 'Legal', 'SaaS', 'Finance', 'NonProfit'], desc: 'Industry-standard accounting and automated billing.', link: 'quickbooks.html', tags: ['Finance'] },
            { id: 'zendesk', name: 'Zendesk', domain: 'zendesk.com', ind: ['SaaS', 'Ecommerce', 'Agency', 'Hospitality', 'Education'], desc: 'Enterprise-grade customer service and ticketing system.', link: 'zendesk.html', tags: ['Support'] },
            { id: 'highlevel', name: 'HighLevel', domain: 'gohighlevel.com', customLogo: 'https://images.g2crowd.com/uploads/product/image/large_detail/large_detail_9e317070104764b88a916723e743a654/highlevel.png', ind: ['Agency', 'Real Estate'], desc: 'Marketing platform built specifically for agencies.', link: 'highlevel.html', tags: ['Agency'] },
            { id: 'pandadoc', name: 'PandaDoc', domain: 'pandadoc.com', ind: ['Legal', 'Agency', 'SaaS', 'Real Estate', 'Finance'], desc: 'Automated document signing and secure proposal tracking.', link: 'pandadoc.html', tags: ['Document'] },
            { id: 'katana', name: 'Katana Cloud', domain: 'katanamrp.com', ind: ['Ecommerce', 'Construction'], desc: 'Advanced manufacturing and inventory management software.', link: 'katana.html', tags: ['Inventory'] },
            { id: 'appointy', name: 'Appointy', domain: 'appointy.com', customLogo: 'https://cdn-1.webcatalog.io/catalog/appointy/appointy-icon-filled-256.png?v=1714774395893', ind: ['Medical', 'Legal', 'Hospitality'], desc: 'HIPAA-compliant patient scheduling portal.', link: 'appointy.html', tags: ['Booking'] },
            { id: 'calendly', name: 'Calendly', domain: 'calendly.com', ind: ['Agency', 'SaaS', 'Medical', 'Real Estate', 'Education'], desc: 'Automated scheduling and calendar synchronization platform.', link: 'calendly.html', tags: ['Booking'] },
            { id: 'notion', name: 'Notion', domain: 'notion.so', ind: ['Agency', 'SaaS', 'Education', 'NonProfit'], desc: 'All-in-one workspace for documents and wikis.', link: 'notion.html', tags: ['Workspace'] },
            { id: 'brevo', name: 'Brevo', domain: 'brevo.com', customLogo: 'https://cdn.worldvectorlogo.com/logos/brevo-1.svg', ind: ['Ecommerce', 'Agency', 'Hospitality', 'NonProfit'], desc: 'Affordable, scalable email marketing platform.', link: 'brevo.html', tags: ['Marketing'] },
            { id: 'slack', name: 'Slack', domain: 'slack.com', ind: ['SaaS', 'Agency', 'Ecommerce', 'NonProfit', 'Education'], desc: 'The hub for team communication and workflows.', link: 'slack.html', tags: ['Comms'] },
            { id: 'dropbox', name: 'Dropbox', domain: 'dropbox.com', ind: ['Construction', 'Agency', 'Legal', 'Real Estate', 'Education'], desc: 'AI-enhanced secure cloud file-sharing.', link: 'dropbox.html', tags: ['Storage'] },
            { id: 'activecampaign', name: 'ActiveCampaign', domain: 'activecampaign.com', ind: ['Agency', 'SaaS', 'Ecommerce', 'Education'], desc: 'Deep marketing automation platform.', link: 'activecampaign.html', tags: ['Marketing'] }
        ];

        function renderGrid(filterIndustry = 'All') {
            const grid = document.getElementById('library-grid');
            grid.innerHTML = '';
            let filteredTools = softwareDatabase.filter(tool => filterIndustry === 'All' || tool.ind.includes(filterIndustry));

            filteredTools.forEach(tool => {
                let logoSrc = tool.customLogo ? tool.customLogo : `https://logo.clearbit.com/${tool.domain}?size=250`;
                
                grid.innerHTML += `
                    <a href="${tool.link}" class="lib-card">
                        <div class="card-top">
                            <img src="${logoSrc}" onerror="this.src='https://t3.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://${tool.domain}&size=128';" class="card-logo" alt="${tool.name}">
                            <h2 class="card-title">${tool.name}</h2>
                        </div>
                        <p class="card-desc">${tool.desc}</p>
                        <div class="card-bottom">
                            <div class="card-tags">${tool.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                            <div class="card-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                        </div>
                    </a>
                `;
            });
        }

        function filterLibrary(industry) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderGrid(industry);
        }

        renderGrid();
    </script>
</body>
</html>
