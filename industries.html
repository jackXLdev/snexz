<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Library | Snexz</title>
    <meta name="description" content="Browse the Snexz verified database of B2B SaaS architecture.">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #F9FAFB; 
            --brand-main: #111827; 
            --text-main: #111827; 
            --text-sub: #6B7280; 
            --border: #E5E7EB; 
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-premium: 0 10px 25px -5px rgba(17, 24, 39, 0.1);
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        nav { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; padding: 10px 0 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo { height: 35px; width: auto; stroke: var(--brand-main); }
        .nav-logo polygon { fill: var(--brand-main); }
        .nav-name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; color: var(--brand-main); margin: 0; }
        
        .nav-back { font-weight: 700; color: var(--text-main); text-decoration: none; font-size: 0.95rem; padding: 10px 18px; border-radius: 8px; background: #FFF; border: 1px solid var(--border); transition: 0.2s; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); }
        .nav-back:hover { box-shadow: var(--shadow-premium); border-color: #D1D5DB; transform: translateY(-2px); }

        main { flex: 1; width: 100%; max-width: 1100px; display: flex; flex-direction: column; animation: fadeUp 0.6s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { margin-bottom: 30px; }
        .page-title { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 3rem; letter-spacing: -1px; color: var(--brand-main); margin: 0 0 10px 0; line-height: 1.1; }
        .page-subtitle { color: var(--text-sub); font-size: 1.15rem; font-weight: 500; margin: 0; }

        /* Industry Symbols */
        .filter-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 30px; scrollbar-width: none; }
        .filter-container::-webkit-scrollbar { display: none; }
        
        .filter-btn { background: #FFF; border: 1px solid var(--border); color: var(--text-sub); font-weight: 700; font-size: 0.9rem; padding: 10px 18px; border-radius: 12px; cursor: pointer; transition: 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-sm); }
        .filter-btn:hover { border-color: var(--brand-main); color: var(--text-main); }
        .filter-btn.active { background: var(--brand-main); color: #FFF; border-color: var(--brand-main); }

        /* The Custom Symbols */
        .symbol { width: 18px; height: 18px; border: 2px solid currentColor; border-radius: 3px; display: inline-block; position: relative; }
        .symbol-agency { border-radius: 50%; }
        .symbol-agency::after { content: ''; position: absolute; top: 3px; left: 3px; width: 8px; height: 8px; background: currentColor; border-radius: 50%; }
        .symbol-const { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
        .symbol-ecom { width: 18px; height: 12px; margin-top: 4px; }
        .symbol-ecom::after { content: ''; position: absolute; top: -5px; left: 4px; width: 6px; height: 4px; border: 2px solid currentColor; border-bottom: none; border-radius: 4px 4px 0 0; }
        .symbol-med { border: none; height: 18px; width: 18px; background: linear-gradient(90deg, transparent 7px, currentColor 7px, currentColor 11px, transparent 11px), linear-gradient(0deg, transparent 7px, currentColor 7px, currentColor 11px, transparent 11px); }
        .filter-btn.active .symbol { color: #FFF; }

        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-bottom: 60px; }
        
        .lib-card { background: #FFF; border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); text-decoration: none; display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .lib-card:hover { border-color: var(--brand-main); box-shadow: var(--shadow-premium); transform: translateY(-4px); }
        
        .card-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-logo { width: 50px; height: 50px; border-radius: 12px; object-fit: contain; border: 1px solid var(--border); padding: 5px; background: #FFF; }
        .card-title { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .card-desc { color: var(--text-sub); font-size: 0.95rem; line-height: 1.5; margin: 0 0 20px 0; flex: 1; }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #F1F5F9; padding-top: 15px; }
        .card-tags { display: flex; gap: 8px; }
        .tag { background: #F3F4F6; color: var(--text-main); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; border-radius: 6px; font-family: 'Outfit', sans-serif; }
        
        .card-arrow { color: var(--text-sub); transition: 0.2s; }
        .lib-card:hover .card-arrow { color: var(--brand-main); transform: translateX(4px); }

        .site-footer { padding: 40px 0; text-align: center; color: var(--text-sub); font-size: 0.85rem; border-top: 1px solid var(--border); width: 100%; max-width: 1100px; font-weight: 600; margin-top: auto; }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg"><path d="M 338 100 L 863 100 L 663 300 L 843 460 L 843 540 L 663 700 L 138 700 L 338 500 L 158 340 L 158 260 Z" stroke-width="85" fill="none" stroke-linejoin="miter" stroke-linecap="butt" stroke-miterlimit="10" /><polygon points="300.5,280 430.5,280 700.5,520 570.5,520" /></svg>
            <span class="nav-name">Snexz</span>
        </a>
        <a href="/" class="nav-back"><span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></span> Back to Snexz</a>
    </nav>

    <main>
        <div class="page-header">
            <h1 class="page-title">Software Library</h1>
            <p class="page-subtitle">Browse our verified database of B2B SaaS architecture.</p>
        </div>

        <div class="filter-container">
            <button class="filter-btn active" onclick="filterLibrary('All')">All Systems</button>
            <button class="filter-btn" onclick="filterLibrary('Construction')"><span class="symbol symbol-const"></span> Construction</button>
            <button class="filter-btn" onclick="filterLibrary('Agency')"><span class="symbol symbol-agency"></span> Agency</button>
            <button class="filter-btn" onclick="filterLibrary('Ecommerce')"><span class="symbol symbol-ecom"></span> E-Commerce</button>
            <button class="filter-btn" onclick="filterLibrary('Medical')"><span class="symbol symbol-med"></span> Medical</button>
        </div>

        <div class="library-grid" id="library-grid"></div>
    </main>

    <footer class="site-footer">
        <div>&copy; 2026 Snexz. All rights reserved.</div>
    </footer>

    <script>
        const softwareDatabase = [
            { id: 'hubspot', name: 'HubSpot', domain: 'hubspot.com', ind: ['Agency', 'SaaS', 'Ecommerce'], desc: 'The gold standard CRM and marketing automation suite.', link: 'hubspot.html', tags: ['Sales', 'Marketing'] },
            { id: 'monday', name: 'Monday.com', domain: 'monday.com', ind: ['Agency', 'SaaS', 'Construction'], desc: 'Highly visual, customizable work OS and project tracker.', link: 'monday.html', tags: ['Project Mgmt'] },
            { id: 'shopify', name: 'Shopify', domain: 'shopify.com', ind: ['Ecommerce'], desc: 'The definitive platform for independent retail architecture.', link: 'shopify.html', tags: ['E-Commerce'] },
            { id: 'contractor-foreman', name: 'Contractor Foreman', domain: 'contractorforeman.com', ind: ['Construction'], desc: 'All-in-one management for specialty contractors.', link: 'contractor-foreman.html', tags: ['Construction'] },
            { id: 'quickbooks', name: 'QuickBooks', domain: 'quickbooks.intuit.com', ind: ['Construction', 'Agency', 'Medical', 'Ecommerce', 'Finance'], desc: 'Industry-standard accounting and automated billing.', link: 'quickbooks.html', tags: ['Finance'] },
            { id: 'zendesk', name: 'Zendesk', domain: 'zendesk.com', ind: ['SaaS', 'Ecommerce', 'Agency'], desc: 'Enterprise-grade customer service and ticketing system.', link: 'zendesk.html', tags: ['Support'] },
            
            // HARDCODED GUARANTEED LOGOS FOR TROUBLE TOOLS
            { id: 'highlevel', name: 'HighLevel', domain: 'gohighlevel.com', customLogo: 'https://images.g2crowd.com/uploads/product/image/large_detail/large_detail_9e317070104764b88a916723e743a654/highlevel.png', ind: ['Agency'], desc: 'Marketing platform built specifically for agencies.', link: 'highlevel.html', tags: ['Agency'] },
            { id: 'appointy', name: 'Appointy', domain: 'appointy.com', customLogo: 'https://www.appointy.com/wp-content/uploads/2018/11/Appointy-Logo-1.png', ind: ['Medical'], desc: 'HIPAA-compliant patient scheduling portal.', link: 'appointy.html', tags: ['Booking'] },
            { id: 'brevo', name: 'Brevo', domain: 'brevo.com', customLogo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Brevo_Logo.svg/2560px-Brevo_Logo.svg.png', ind: ['Ecommerce', 'Agency'], desc: 'Affordable, scalable email marketing platform.', link: 'brevo.html', tags: ['Marketing'] },
            
            { id: 'notion', name: 'Notion', domain: 'notion.so', ind: ['Agency', 'SaaS'], desc: 'All-in-one workspace for documents and wikis.', link: 'notion.html', tags: ['Workspace'] },
            { id: 'slack', name: 'Slack', domain: 'slack.com', ind: ['SaaS', 'Agency'], desc: 'The hub for team communication and workflows.', link: 'slack.html', tags: ['Comms'] },
            { id: 'dropbox', name: 'Dropbox', domain: 'dropbox.com', ind: ['Construction', 'Agency'], desc: 'AI-enhanced secure cloud file-sharing.', link: 'dropbox.html', tags: ['Storage'] }
        ];

        function renderGrid(filterIndustry = 'All') {
            const grid = document.getElementById('library-grid');
            grid.innerHTML = '';

            let filteredTools = softwareDatabase.filter(tool => filterIndustry === 'All' || tool.ind.includes(filterIndustry));

            filteredTools.forEach(tool => {
                // FIXED LOGO LOGIC
                const logoSrc = tool.customLogo ? tool.customLogo : `https://logo.clearbit.com/${tool.domain}?size=100`;
                
                grid.innerHTML += `
                    <a href="${tool.link}" class="lib-card">
                        <div class="card-top">
                            <img src="${logoSrc}" onerror="this.src='https://t3.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://${tool.domain}&size=128';" class="card-logo" alt="${tool.name}">
                            <h2 class="card-title">${tool.name}</h2>
                        </div>
                        <p class="card-desc">${tool.desc}</p>
                        <div class="card-bottom">
                            <div class="card-tags">${tool.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                            <div class="card-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                        </div>
                    </a>
                `;
            });
        }

        function filterLibrary(industry) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderGrid(industry);
        }

        renderGrid();
    </script>
</body>
</html>
