    <style>
        :root {

            --text-main: #000000; 
            --text-sub: #6B7280; 
            --border: #E5E7EB; 
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-premium: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        nav { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; padding: 10px 0 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo { height: 35px; width: auto; }
        .nav-name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; color: var(--brand-main); margin: 0; }
        
        .nav-back { font-weight: 700; color: var(--text-main); text-decoration: none; font-size: 0.95rem; padding: 10px 18px; border-radius: 8px; background: #FFF; border: 1px solid var(--border); transition: 0.2s; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); }
        .nav-back:hover { box-shadow: var(--shadow-premium); border-color: #D1D5DB; transform: translateY(-2px); }

        main { flex: 1; width: 100%; max-width: 1100px; display: flex; flex-direction: column; animation: fadeUp 0.6s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { margin-bottom: 30px; }
        .page-title { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 3rem; letter-spacing: -1px; color: var(--brand-main); margin: 0; line-height: 1.1; }
        .page-subtitle { color: var(--text-sub); font-size: 1.15rem; font-weight: 500; margin: 10px 0 0 0; }

        .filter-container { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 40px; width: 100%; justify-content: flex-start; }
        
        .filter-btn { background: #FFF; border: 1px solid var(--border); color: var(--text-sub); font-weight: 700; font-size: 0.9rem; padding: 10px 18px; border-radius: 12px; cursor: pointer; transition: 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); }
        .filter-btn svg { width: 16px; height: 16px; stroke-width: 2.5; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .filter-btn:hover { border-color: var(--brand-main); color: var(--text-main); }
        .filter-btn.active { background: var(--brand-main); color: #FFF; border-color: var(--brand-main); }

        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-bottom: 60px; width: 100%; }
        
        .lib-card { background: #FFF; border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); text-decoration: none; display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .lib-card:hover { border-color: var(--brand-main); box-shadow: var(--shadow-premium); transform: translateY(-4px); }
        
        .card-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        
        .card-logo { width: 45px; height: 45px; border-radius: 10px; border: 1px solid var(--border); padding: 5px; background: #FFF; display: flex; align-items: center; justify-content: center; }
        .card-logo img, .card-logo svg { width: 100%; height: 100%; object-fit: contain; }

        .card-title { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .card-score { margin-left: auto; font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem; color: var(--brand-main); background: #FFF; border: 2px solid var(--border); padding: 5px 12px; border-radius: 10px; transition: 0.3s; }
        .lib-card:hover .card-score { border-color: var(--brand-main); transform: scale(1.05); }

        .card-desc { color: var(--text-sub); font-size: 0.95rem; line-height: 1.5; margin: 0 0 20px 0; flex: 1; }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #F1F5F9; padding-top: 15px; }
        .card-tags { display: flex; gap: 8px; }
        .tag { background: #F3F4F6; color: var(--text-main); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; border-radius: 6px; font-family: 'Outfit', sans-serif; }
        
        .card-arrow { color: var(--text-sub); transition: 0.2s; }
        .lib-card:hover .card-arrow { color: var(--brand-main); transform: translateX(4px); }

        .site-footer { padding: 40px 0; text-align: center; color: var(--text-sub); font-size: 0.85rem; border-top: 1px solid var(--border); width: 100%; max-width: 1100px; font-weight: 600; margin-top: auto; }
    </style>

        function renderGrid(filterIndustry = 'All') {
            const grid = document.getElementById('library-grid');
            grid.innerHTML = '';
            let filteredTools = softwareDatabase.filter(tool => filterIndustry === 'All' || tool.ind.includes(filterIndustry));

            filteredTools.forEach(tool => {
                let logoContent = tool.svgLogo ? 
                    tool.svgLogo : 
                    `<img src="https://logo.clearbit.com/${tool.domain}?size=250" onerror="this.src='https://t3.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://${tool.domain}&size=128';" alt="${tool.name}">`;
                
                grid.innerHTML += `
                    <a href="${tool.link}" class="lib-card">
                        <div class="card-top">
                            <div class="card-logo">${logoContent}</div>
                            <h2 class="card-title">${tool.name}</h2>
                            <div class="card-score">${tool.score}</div>
                        </div>
                        <p class="card-desc">${tool.desc}</p>
                        <div class="card-bottom">
                            <div class="card-tags">${tool.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                            <div class="card-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                        </div>
                    </a>
                `;
            });
        }

        function filterLibrary(industry) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderGrid(industry);
        }

        renderGrid();
    </script>
