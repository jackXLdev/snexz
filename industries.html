<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Library | Snexz</title>
    <meta name="description" content="Browse the Snexz verified database of B2B SaaS architecture.">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #F9FAFB; 
            --brand-main: #111827; 
            --text-main: #111827; 
            --text-sub: #6B7280; 
            --border: #E5E7EB; 
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-premium: 0 10px 25px -5px rgba(17, 24, 39, 0.1);
        }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        nav { width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center; padding: 10px 0 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .nav-logo { height: 35px; width: auto; stroke: var(--brand-main); }
        .nav-logo polygon { fill: var(--brand-main); }
        .nav-name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 1.8rem; letter-spacing: -0.5px; color: var(--brand-main); margin: 0; }
        
        .nav-back { font-weight: 700; color: var(--text-main); text-decoration: none; font-size: 0.95rem; padding: 10px 18px; border-radius: 8px; background: #FFF; border: 1px solid var(--border); transition: 0.2s; display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow-sm); }
        .nav-back:hover { box-shadow: var(--shadow-premium); border-color: #D1D5DB; transform: translateY(-2px); }
        .nav-back span { display: flex; align-items: center; transition: transform 0.2s; }
        .nav-back:hover span { transform: translateX(-4px); }

        main { flex: 1; width: 100%; max-width: 1100px; display: flex; flex-direction: column; animation: fadeUp 0.6s ease-out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { margin-bottom: 30px; }
        .page-title { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 3rem; letter-spacing: -1px; color: var(--brand-main); margin: 0 0 10px 0; line-height: 1.1; }
        .page-subtitle { color: var(--text-sub); font-size: 1.15rem; font-weight: 500; margin: 0; }

        /* Interactive Filter Bar */
        .filter-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 30px; scrollbar-width: none; -ms-overflow-style: none; }
        .filter-container::-webkit-scrollbar { display: none; }
        .filter-btn { background: #FFF; border: 1px solid var(--border); color: var(--text-sub); font-weight: 700; font-size: 0.9rem; padding: 10px 16px; border-radius: 12px; cursor: pointer; transition: 0.2s; white-space: nowrap; font-family: 'Plus Jakarta Sans', sans-serif; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 6px; }
        .filter-btn:hover { border-color: #D1D5DB; transform: translateY(-2px); color: var(--text-main); }
        .filter-btn.active { background: var(--brand-main); color: #FFF; border-color: var(--brand-main); box-shadow: 0 4px 15px rgba(17, 24, 39, 0.2); transform: translateY(-2px); }

        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-bottom: 60px; }
        
        .lib-card { background: #FFF; border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); text-decoration: none; display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .lib-card:hover { border-color: var(--brand-main); box-shadow: var(--shadow-premium); transform: translateY(-4px); }
        
        .card-top { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-logo { width: 45px; height: 45px; border-radius: 10px; object-fit: contain; border: 1px solid var(--border); padding: 4px; background: #FFF; }
        .card-title { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin: 0; }
        
        .card-desc { color: var(--text-sub); font-size: 0.95rem; line-height: 1.5; margin: 0 0 20px 0; flex: 1; }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #F1F5F9; padding-top: 15px; }
        .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { background: #F3F4F6; color: var(--text-main); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; padding: 4px 8px; border-radius: 6px; font-family: 'Outfit', sans-serif; }
        
        .card-arrow { color: var(--text-sub); transition: 0.2s; display: flex; align-items: center; }
        .lib-card:hover .card-arrow { color: var(--brand-main); transform: translateX(4px); }

        .no-results { display: none; text-align: center; padding: 40px; color: var(--text-sub); font-weight: 600; font-size: 1.1rem; grid-column: 1 / -1; }

        .site-footer { padding: 40px 0; text-align: center; color: var(--text-sub); font-size: 0.85rem; border-top: 1px solid var(--border); width: 100%; max-width: 1100px; font-weight: 600; margin-top: auto; }
        .footer-links { margin-bottom: 15px; display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-main); text-decoration: none; font-weight: 700; transition: 0.2s; }
        .footer-links a:hover { color: var(--text-sub); }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
                <path d="M 338 100 L 863 100 L 663 300 L 843 460 L 843 540 L 663 700 L 138 700 L 338 500 L 158 340 L 158 260 Z" stroke-width="85" fill="none" stroke-linejoin="miter" stroke-linecap="butt" stroke-miterlimit="10" />
                <polygon points="300.5,280 430.5,280 700.5,520 570.5,520" />
            </svg>
            <span class="nav-name">Snexz</span>
        </a>
        <a href="/" class="nav-back">
            <span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></span> 
            Back to Engine
        </a>
    </nav>

    <main>
        <div class="page-header">
            <h1 class="page-title">Software Library</h1>
            <p class="page-subtitle">Browse our verified database of B2B SaaS architecture.</p>
        </div>

        <div class="filter-container" id="filter-bar">
            <button class="filter-btn active" onclick="filterLibrary('All')">All Systems</button>
            <button class="filter-btn" onclick="filterLibrary('Construction')">🏗️ Construction</button>
            <button class="filter-btn" onclick="filterLibrary('Agency')">📈 Agency</button>
            <button class="filter-btn" onclick="filterLibrary('Ecommerce')">🛒 E-Commerce</button>
            <button class="filter-btn" onclick="filterLibrary('Medical')">⚕️ Medical</button>
            <button class="filter-btn" onclick="filterLibrary('SaaS')">💻 Tech / SaaS</button>
            <button class="filter-btn" onclick="filterLibrary('Real Estate')">🏢 Real Estate</button>
            <button class="filter-btn" onclick="filterLibrary('Finance')">📊 Finance</button>
        </div>

        <div class="library-grid" id="library-grid">
            </div>
        <div class="no-results" id="no-results">No systems currently verified for this exact category.</div>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="/">Snexz Engine</a>
            <a href="mailto:hello@snexz.com">Contact</a>
        </div>
        <div>&copy; 2026 Snexz. All rights reserved.</div>
    </footer>

    <script>
        // Database with Custom Logo overrides for problematic domains
        const softwareDatabase = [
            { id: 'hubspot', name: 'HubSpot', domain: 'hubspot.com', ind: ['Agency', 'SaaS', 'Ecommerce', 'Finance'], desc: 'The gold standard CRM and marketing automation suite.', link: 'hubspot.html', tags: ['Sales', 'Marketing'] },
            { id: 'monday', name: 'Monday.com', domain: 'monday.com', ind: ['Agency', 'SaaS', 'Construction', 'Real Estate'], desc: 'Highly visual, customizable work OS and project tracker.', link: 'monday.html', tags: ['Project Mgmt', 'Ops'] },
            { id: 'shopify', name: 'Shopify', domain: 'shopify.com', ind: ['Ecommerce'], desc: 'The definitive platform for independent retail architecture.', link: 'shopify.html', tags: ['E-Commerce', 'Retail'] },
            { id: 'contractor-foreman', name: 'Contractor Foreman', domain: 'contractorforeman.com', ind: ['Construction'], desc: 'All-in-one management for specialty contractors and builders.', link: 'contractor-foreman.html', tags: ['Construction', 'Ops'] },
            { id: 'quickbooks', name: 'QuickBooks', domain: 'quickbooks.intuit.com', ind: ['Construction', 'Agency', 'Medical', 'Ecommerce', 'Real Estate', 'SaaS', 'Finance'], desc: 'Industry-standard accounting and automated billing.', link: 'quickbooks.html', tags: ['Finance', 'Billing'] },
            { id: 'zendesk', name: 'Zendesk', domain: 'zendesk.com', ind: ['SaaS', 'Ecommerce', 'Agency'], desc: 'Enterprise-grade customer service and ticketing system.', link: 'zendesk.html', tags: ['Support', 'CRM'] },
            { id: 'highlevel', name: 'HighLevel', domain: 'gohighlevel.com', ind: ['Agency', 'Real Estate'], desc: 'White-label marketing platform built specifically for agencies.', link: 'highlevel.html', tags: ['Agency', 'Marketing'] },
            { id: 'pandadoc', name: 'PandaDoc', domain: 'pandadoc.com', ind: ['Agency', 'SaaS', 'Real Estate', 'Finance'], desc: 'Automated document signing and secure proposal tracking.', link: 'pandadoc.html', tags: ['Legal', 'Sales'] },
            { id: 'katana', name: 'Katana Cloud', domain: 'katanamrp.com', ind: ['Ecommerce', 'Construction'], desc: 'Advanced manufacturing and inventory management software.', link: 'katana.html', tags: ['Inventory', 'Mfg'] },
            
            // Appointy has a known pixelation issue with clearbit/favicons. Hardcoding a reliable URL override.
            { id: 'appointy', name: 'Appointy', domain: 'appointy.com', customLogo: 'https://cdn.iconscout.com/icon/free/png-256/free-appointy-3628628-3029853.png', ind: ['Medical', 'Hospitality'], desc: 'HIPAA-compliant patient and client scheduling portal.', link: 'appointy.html', tags: ['Booking', 'Medical'] },
            
            { id: 'notion', name: 'Notion', domain: 'notion.so', ind: ['Agency', 'SaaS'], desc: 'Highly flexible, all-in-one workspace for documents and wikis.', link: 'notion.html', tags: ['Workspace', 'Docs'] },
            
            // Brevo has a known pixelation issue. Hardcoding official vector format.
            { id: 'brevo', name: 'Brevo', domain: 'brevo.com', customLogo: 'https://cdn.worldvectorlogo.com/logos/brevo-1.svg', ind: ['Ecommerce', 'Agency'], desc: 'Affordable, scalable email marketing and automation platform.', link: 'brevo.html', tags: ['Marketing', 'Email'] },
            
            { id: 'slack', name: 'Slack', domain: 'slack.com', ind: ['SaaS', 'Agency', 'Ecommerce'], desc: 'The industry-standard hub for team communication and workflows.', link: 'slack.html', tags: ['Comms', 'Internal'] },
            { id: 'dropbox', name: 'Dropbox', domain: 'dropbox.com', ind: ['Construction', 'Agency', 'Real Estate'], desc: 'AI-enhanced workspace and secure cloud file-sharing architecture.', link: 'dropbox.html', tags: ['Storage', 'Cloud'] },
            { id: 'activecampaign', name: 'ActiveCampaign', domain: 'activecampaign.com', ind: ['Agency', 'SaaS', 'Ecommerce'], desc: 'Deep marketing automation and customer experience platform.', link: 'activecampaign.html', tags: ['Marketing', 'CRM'] }
        ];

        function renderGrid(filterIndustry = 'All') {
            const grid = document.getElementById('library-grid');
            const noResults = document.getElementById('no-results');
            grid.innerHTML = ''; // Clear current grid

            let filteredTools = softwareDatabase.filter(tool => {
                if (filterIndustry === 'All') return true;
                return tool.ind.includes(filterIndustry);
            });

            if (filteredTools.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                
                filteredTools.forEach((tool, index) => {
                    // Logic to use customLogo if it exists, otherwise use Clearbit with fallback
                    let logoSource = '';
                    if (tool.customLogo) {
                        logoSource = `<img src="${tool.customLogo}" class="card-logo" alt="${tool.name} logo">`;
                    } else {
                        logoSource = `<img src="https://logo.clearbit.com/${tool.domain}" onerror="this.onerror=null; this.src='https://icon.horse/icon/${tool.domain}';" class="card-logo" alt="${tool.name} logo">`;
                    }

                    let tagsHTML = tool.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                    
                    // Stagger the animation slightly for a premium feel
                    let delay = index * 0.05;

                    grid.innerHTML += `
                        <a href="${tool.link}" class="lib-card" style="animation-delay: ${delay}s;">
                            <div class="card-top">
                                ${logoSource}
                                <h2 class="card-title">${tool.name}</h2>
                            </div>
                            <p class="card-desc">${tool.desc}</p>
                            <div class="card-bottom">
                                <div class="card-tags">${tagsHTML}</div>
                                <div class="card-arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
                            </div>
                        </a>
                    `;
                });
            }
        }

        function filterLibrary(industry) {
            // Update active state on buttons
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // Find the clicked button and make it active
            const clickedBtn = Array.from(buttons).find(btn => btn.innerText.includes(industry) || (industry === 'All' && btn.innerText === 'All Systems'));
            if (clickedBtn) clickedBtn.classList.add('active');

            // Re-render the grid
            renderGrid(industry);
        }

        // Initialize the grid on page load
        document.addEventListener('DOMContentLoaded', () => {
            renderGrid('All');
        });
    </script>
</body>
</html>
