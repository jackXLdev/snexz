    <style>
        :root { 
            --bg: #F9FAFB; 
            --brand-main: #111827; 
            --text-main: #111827; 
            --text-sub: #6B7280; 
            --border: #E5E7EB;

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

        .loader-svg polygon { opacity: 0; transform: translateY(20px); animation: lockIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.1s forwards; fill: var(--brand-main); }
        
        @keyframes wipeRight { to { clip-path: inset(0 0 0 0); } }
        @keyframes lockIn { to { opacity: 1; transform: translateY(0); } }
        
        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-top: 16vh; width: 100%; max-width: 680px; text-align: center; opacity: 0; animation: revealMain 0.8s ease-out 2.6s forwards; }

        .brand-header { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px; }

        .brand-name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 4rem; letter-spacing: -1.5px; color: var(--brand-main); margin: 0; line-height: 1; }

        .input-cluster { background: #FFF; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-premium); margin-bottom: 20px; border: 1px solid rgba(17,24,39,0.06); }
        
        .input-row { display: flex; width: 100%; border-bottom: 1px solid var(--border); }
        .input-row:last-child { border-bottom: none; }
        @media (max-width: 600px) { .input-row { flex-direction: column; } }

            .logo-svg { height: 50px; }
            .brand-name { font-size: 3rem; }
            
            .brand-header-result { flex-direction: column; align-items: flex-start; gap: 20px; }

            .score-big { font-size: 3.5rem; line-height: 1; }
            .score-label { align-self: center; text-align: right; }
            .result-title h2 { font-size: 1.6rem; }
            
            .metric-row { flex-direction: column; align-items: flex-start; gap: 6px; padding: 15px 0; }
            
            .ranked-row { flex-wrap: wrap; padding: 20px; }
            .row-left { width: 100%; margin-bottom: 15px; align-items: flex-start;}
            .row-score { width: 100%; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 15px; font-size: 1.5rem; }
        }

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-overlay');
            if (window.getComputedStyle(loader).display !== 'none') {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.visibility = 'hidden'; }, 500);
                }, 2000); 
            }
        });

        async function localizeCurrency() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const userCurrency = data.currency;
                const budgetSelect = document.getElementById('input-budget');
                const rates = { 'USD': { sym: '$', mult: 1.25 }, 'EUR': { sym: '€', mult: 1.17 }, 'AUD': { sym: 'A$', mult: 1.95 }, 'CAD': { sym: 'C$', mult: 1.70 } };
                if (rates[userCurrency]) {
                    const c = rates[userCurrency];
                    budgetSelect.options[1].text = `${c.sym}${Math.round(10 * c.mult)} - ${c.sym}${Math.round(50 * c.mult)}`;
                    budgetSelect.options[2].text = `${c.sym}${Math.round(50 * c.mult)} - ${c.sym}${Math.round(200 * c.mult)}`;
                    budgetSelect.options[3].text = `${c.sym}${Math.round(200 * c.mult)}+`;
                }
            } catch (error) { console.log("Localization deferred to default."); }
        }
        localizeCurrency();

        function openModal(type) {
            const m = document.getElementById('info-modal'), t = document.getElementById('modal-title'), b = document.getElementById('modal-body');
            if(type === 'how') { 
                t.innerText = "The Decision Engine"; 
                b.innerHTML = "<p>Snexz operates utilizing <strong>Programmatic Feature Matching</strong>. By bypassing surface-level marketplace marketing, our engine maps your specific industry, scale, and compliance needs directly to verified B2B SaaS architecture.</p><p>We cross-reference budget constraints and operational workflows to establish an optimal software match, saving you hours of research and thousands in mismatched software subscriptions.</p>"; 
            } else { 
                t.innerText = "Privacy Policy"; 
                b.innerHTML = "<p>Business privacy is a foundational pillar of the Snexz infrastructure. We operate strictly as an analytical proxy; we do not track, store, or monetize individual company data or browsing habits.</p><p>Our engine strictly analyzes the parameters provided during a search request. Communication is secured via industry-standard encryption, ensuring a completely anonymous and private verification experience.</p>"; 
            }
            m.style.display = 'flex';
        }
        function closeModal() { document.getElementById('info-modal').style.display = 'none'; }
        
        function editSearch() {
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('search-box-ui').style.display = 'block';
            
            document.getElementById('audit-btn').style.display = 'block';
            document.getElementById('audit-btn').disabled = false;
            document.getElementById('progress-wrapper').style.display = 'none';
            document.getElementById('progress-bar').style.width = '0%';
        }

        function startSearch() {
            const reqInd = document.getElementById('input-industry').value;
            const reqTask = document.getElementById('input-task').value;
            const reqSize = document.getElementById('input-size').value;
            const reqBudget = document.getElementById('input-budget').value;
            
            if (!reqInd || !reqTask || !reqSize || !reqBudget) {
                const btn = document.getElementById('audit-btn');
                const originalText = btn.innerText;
                btn.innerText = "Please complete all fields";
                btn.style.backgroundColor = "#EF4444"; 
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = "var(--brand-main)";
                }, 2000);
                return;
            }

            document.getElementById('audit-btn').style.display = 'none';
            const progressWrapper = document.getElementById('progress-wrapper');
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            progressWrapper.style.display = 'block';

            const stages = [
                "Initializing engine...",
                "Querying SaaS database...",
                "Analyzing industry compliance...",
                "Evaluating scale constraints...",
                "Cross-referencing budget...",
                "Calculating ROI metrics...",
                "Testing API integrations...",
                "Compiling decision matrix...",
                "Finalizing optimal match..."
            ];

            let progress = 0;
            let currentStage = 0;
            progressText.innerText = stages[0];

            function processStep() {
                let jump = Math.floor(Math.random() * 7) + 1;
                let pause = Math.floor(Math.random() * 600) + 100;

                if (Math.random() > 0.85) pause += 800; 

                progress += jump;

                if (progress >= 100) {
                    progress = 100;
                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        showResults(reqInd, reqTask, reqSize, reqBudget);
                    }, 400);
                    return;
                }

                progressBar.style.width = `${progress}%`;

                const stageIndex = Math.floor((progress / 100) * stages.length);
                if (stageIndex < stages.length && currentStage !== stageIndex) {
                    currentStage = stageIndex;
                    progressText.innerText = stages[currentStage];
                }

                setTimeout(processStep, pause);
            }
            
            processStep();
        }

        function showResults(reqInd, reqTask, reqSize, reqBudget) {
            let results = softwareDatabase.map(tool => {
                let score = 50; 
                score += (tool.id.length % 4); 
                if (tool.ind.includes(reqInd)) score += 25; else score -= 10; 
                if (tool.task.includes(reqTask)) score += 15;
                if (tool.size.includes(reqSize)) score += 8;
                const budgetTiers = { 'Free': 0, 'Low': 1, 'Medium': 2, 'Enterprise': 3 };
                if (budgetTiers[tool.budget[0]] <= budgetTiers[reqBudget]) score += 10;
                if (score > 98) score = 98;
                if (score < 50) score = 50;
                return { ...tool, score };
            });

            results.sort((a, b) => b.score - a.score);
            const topTool = results[0];
            const runnerUps = results.slice(1, 4);

            const resultArea = document.getElementById('result-area');
            
            let runnerUpsHTML = '';
            runnerUps.forEach(tool => {
                const isFiltered = tool.score === 50;
                let logoContent = tool.svgLogo ? 
                    tool.svgLogo : 
                    `<img src="https://logo.clearbit.com/${tool.domain}" onerror="this.onerror=null; this.src='https://t3.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://${tool.domain}&size=128';" alt="${tool.name} logo">`;
                
                runnerUpsHTML += `
                    <a href="/${tool.link}?score=${tool.score}" class="ranked-row" ${isFiltered ? 'style="background: #F9FAFB; border-color: transparent; box-shadow: none;"' : ''}>
                        <div class="row-left">
                            <div class="row-logo">${logoContent}</div>
                            <div class="row-details">
                                <h3 ${isFiltered ? 'style="color: var(--text-sub);"' : ''}>${tool.name}</h3>
                                <p>${isFiltered ? `Lacks native ${reqInd} workflow support.` : tool.desc}</p>
                            </div>
                        </div>
                        <div class="row-score" style="color: ${getScoreColor(tool.score)}; opacity: ${isFiltered ? '0.3' : '1'};">
                            ${isFiltered ? '' : tool.score}
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </div>
                    </a>
                `;
            });

            let topLogoContent = topTool.svgLogo ? 
                topTool.svgLogo : 
                `<img src="https://logo.clearbit.com/${topTool.domain}" onerror="this.onerror=null; this.src='https://t3.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://${topTool.domain}&size=128';" alt="${topTool.name} logo">`;

            resultArea.innerHTML = `
                <button onclick="editSearch()" class="btn-back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to Search
                </button>

                <div class="audit-card">
                    <div class="brand-header-result">
                        <div class="result-logo-container">
                            <div class="company-logo">${topLogoContent}</div>
                            <div class="result-title">
                                <span>Top Recommendation</span>
                                <h2>${topTool.name}</h2>
                            </div>
                        </div>
                        <div class="score-pill">
                            <div class="score-big">${topTool.score}</div>
                            <div class="score-label">Snexz Score</div>
                        </div>
                    </div>
                    
                    <div style="background: #F9FAFB; border-radius: 12px; padding: 15px 20px; border: 1px solid var(--border);">
                        <div class="metric-row"><span>Scale Alignment</span><strong style="color: var(--brand-main);">${reqSize} Tier</strong></div>
                        <div class="metric-row"><span>Industry Compliance</span><strong style="color: var(--brand-main);">${reqInd} Standards</strong></div>
                    </div>
                    
                    <a href="/${topTool.link}?score=${topTool.score}" class="btn-proceed">
                        View Analysis 
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </a>
                </div>

                <div class="ranked-header">
                    Other Tools Analysed
                    <span>Showing top 4 evaluated systems</span>
                </div>
                
                <div class="ranked-list">
                    ${runnerUpsHTML}
                </div>
            `;
            
            document.getElementById('search-box-ui').style.display = 'none';
            resultArea.style.display = 'block';
        }
