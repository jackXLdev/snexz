    <style>
        :root { 
            --bg: #F9FAFB; 
            --brand-main: #000000; 
            --text-main: #000000; 
            --text-sub: #6B7280; 
            --border: #E5E7EB; 
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-premium: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        * { -webkit-tap-highlight-color: transparent; }
        input, select, textarea { caret-color: var(--brand-main); }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        #loader-overlay { position: fixed; inset: 0; background-color: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .loader-svg { width: 120px; height: auto; clip-path: inset(0 100% 0 0); animation: wipeRight 1s cubic-bezier(0.76, 0, 0.24, 1) forwards 0.2s; }
        @keyframes wipeRight { to { clip-path: inset(0 0 0 0); } }
        
        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-top: 16vh; width: 100%; max-width: 680px; text-align: center; opacity: 0; animation: revealMain 0.8s ease-out 2.6s forwards; }
        @keyframes revealMain { to { opacity: 1; } }

        .brand-header { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px; }
        .logo-svg { height: 75px; width: auto; }
        .brand-name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 4rem; letter-spacing: -1.5px; color: var(--brand-main); margin: 0; line-height: 1; }
        .tagline { color: var(--text-main); font-size: 1.15rem; margin-bottom: 35px; font-weight: 600; }
        
        .search-container { background: transparent; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); text-align: left; width: 100%;}
        .input-cluster { background: #FFF; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-premium); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.06); }
        .input-row { display: flex; width: 100%; border-bottom: 1px solid var(--border); }
        .input-row:last-child { border-bottom: none; }
        @media (max-width: 600px) { .input-row { flex-direction: column; } }
        
        .input-field { flex: 1; position: relative; border-right: 1px solid var(--border); background: #FFF; padding: 12px 16px; transition: 0.2s background; }
        .input-field:last-child { border-right: none; }
        @media (max-width: 600px) { .input-field { border-right: none; border-bottom: 1px solid var(--border); } .input-field:last-child { border-bottom: none; } }
        .input-field label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        select { width: 100%; border: none; padding: 4px 0; font-size: 1.05rem; outline: none; font-family: inherit; background: transparent; color: var(--text-main); cursor: pointer; appearance: none; font-weight: 700; }

        .tech-specs-grid { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .tech-toggle { display: block; position: relative; cursor: pointer; flex: 1; min-width: 120px;}
        .tech-toggle input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .tech-toggle span { display: block; padding: 14px 12px; text-align: center; border-radius: 12px; font-size: 0.9rem; font-weight: 700; color: var(--text-sub); transition: all 0.2s; background: #FFF; border: 1.5px solid var(--border); user-select: none; box-shadow: var(--shadow-sm); }
        .tech-toggle input:checked ~ span { background: var(--brand-main); color: #FFF; border-color: var(--brand-main); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        
        .btn-audit { background: var(--brand-main); color: white; border: none; padding: 20px; border-radius: 16px; font-weight: 800; font-size: 1.2rem; cursor: pointer; transition: all 0.2s ease; font-family: 'Outfit', sans-serif; width: 100%; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15); }

        #result-area { display: none; margin-top: 10px; text-align: left; animation: slideUp 0.4s ease-out; width: 100%; }
        .btn-back { display: flex; align-items: center; gap: 8px; background: none; border: none; color: var(--text-main); font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; cursor: pointer; padding: 0; margin-bottom: 25px; }
        .audit-card { background: #FFF; border-radius: 20px; padding: 35px; border: 1px solid var(--border); box-shadow: var(--shadow-premium); margin-bottom: 30px; display: flex; flex-direction: column; gap: 15px;}
        
        .score-pill { display: flex; flex-direction: column; align-items: flex-end; }
        .score-big { font-size: 3.5rem; font-weight: 800; font-family: 'Outfit', sans-serif; line-height: 0.9; color: var(--brand-main); }
        .score-label { font-size: 0.75rem; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }

        .ranked-header { font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 800; color: var(--text-main); margin: 30px 0 15px 0; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .ranked-row { display: flex; align-items: center; justify-content: space-between; background: #FFF; border: 1px solid var(--border); border-radius: 16px; padding: 15px 20px; text-decoration: none; color: inherit; margin-bottom: 12px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); z-index: 10000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: white; padding: 40px; border-radius: 24px; max-width: 500px; animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .site-footer { padding: 40px; text-align: center; color: var(--text-sub); font-size: 0.85rem; margin-top: auto; border-top: 1px solid var(--border); }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .footer-links a { color: var(--text-main); text-decoration: none; font-weight: 700; cursor: pointer; }
    </style>

    function startSearch() {
        const ind = document.getElementById('input-industry').value;
        const task = document.getElementById('input-task').value;
        if (!ind || !task) return;

        let results = softwareDatabase.map(tool => {
            let score = 50 + (tool.id.length % 5); 
            if (tool.ind.includes(ind)) score += 25;
            if (tool.task.includes(task)) score += 15;
            return { ...tool, score: Math.min(score, 98) };
        });

        results.sort((a, b) => b.score - a.score);
        showResults(results[0], results.slice(1, 4));
    }

    function showResults(top, others) {
        const area = document.getElementById('result-area');
        let othersHTML = others.map(tool => `
            <a href="/${tool.link}?score=${tool.score}" class="ranked-row">
                <div><strong>${tool.name}</strong><br><small>${tool.desc}</small></div>
                <div style="font-size:1.5rem; font-weight:800;">${tool.score}</div>
            </a>
        `).join('');

        area.innerHTML = `
            <button onclick="location.reload()" class="btn-back">← Back</button>
            <div class="audit-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>${top.name}</h2>
                    <div class="score-pill"><div class="score-big">${top.score}</div><div class="score-label">Snexz Score</div></div>
                </div>
                <a href="/${top.link}?score=${top.score}" class="btn-audit" style="text-align:center; text-decoration:none;">View Analysis</a>
            </div>
            <div class="ranked-header">Other Evaluated Tools</div>
            ${othersHTML}
        `;
        document.getElementById('search-box-ui').style.display = 'none';
        area.style.display = 'block';
    }
