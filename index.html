<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" sizes="192x192" href="https://www.snexz.com/favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://www.snexz.com/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://www.snexz.com/favicon.png">
    <link rel="apple-touch-icon" href="https://www.snexz.com/favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snexz | SaaS Comparison &amp; Review Platform</title>
    <meta name="description" content="Enter your industry and goals into Snexz to instantly discover the best software to run your business.">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #F9FAFB; 
            --brand-main: #000000; 
            --text-main: #000000; 
            --text-sub: #6B7280; 
            --border: #E5E7EB; 
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-premium: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        * { -webkit-tap-highlight-color: transparent; }
        input, select, textarea { caret-color: var(--brand-main); }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        #loader-overlay { position: fixed; inset: 0; background-color: var(--bg); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .loader-svg { width: 120px; height: auto; clip-path: inset(0 100% 0 0); animation: wipeRight 1s cubic-bezier(0.76, 0, 0.24, 1) forwards 0.2s; }
        
        @keyframes wipeRight { to { clip-path: inset(0 0 0 0); } }
        
        main { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; margin-top: 16vh; width: 100%; max-width: 680px; text-align: center; opacity: 0; transition: opacity 0.8s ease-out; }
        .show-content main { opacity: 1; }

        .brand-header { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 12px; }
        .brand-name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 4rem; letter-spacing: -1.5px; color: var(--brand-main); margin: 0; line-height: 1; }
        .tagline { color: var(--text-main); font-size: 1.15rem; margin-bottom: 35px; font-weight: 600; }
        
        .search-container { text-align: left; width: 100%;}
        .input-cluster { background: #FFF; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-premium); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.06); }
        .input-row { display: flex; width: 100%; border-bottom: 1px solid var(--border); }
        .input-row:last-child { border-bottom: none; }
        .input-field { flex: 1; position: relative; border-right: 1px solid var(--border); background: #FFF; padding: 12px 16px; }
        .input-field:last-child { border-right: none; }
        .input-field label { font-size: 0.75rem; font-weight: 700; color: var(--text-sub); display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        select { width: 100%; border: none; padding: 4px 0; font-size: 1.05rem; outline: none; font-family: inherit; background: transparent; color: var(--text-main); cursor: pointer; appearance: none; font-weight: 700; }
        
        .tech-specs-grid { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;}
        .tech-toggle { display: block; position: relative; cursor: pointer; flex: 1; min-width: 120px;}
        .tech-toggle input { position: absolute; opacity: 0; }
        .tech-toggle span { display: block; padding: 14px 12px; text-align: center; border-radius: 12px; font-size: 0.9rem; font-weight: 700; color: var(--text-sub); background: #FFF; border: 1.5px solid var(--border); transition: all 0.2s; }
        .tech-toggle input:checked ~ span { background: var(--brand-main); color: #FFF; border-color: var(--brand-main); }
        
        .btn-audit { background: var(--brand-main); color: white; border: none; padding: 20px; border-radius: 16px; font-weight: 800; font-size: 1.2rem; cursor: pointer; width: 100%; font-family: 'Outfit', sans-serif; }
        
        .progress-wrapper { display: none; margin-top: 15px; }
        .progress-container { background: #E5E7EB; border-radius: 12px; height: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; background: var(--brand-main); transition: width 0.2s; }

        #result-area { display: none; margin-top: 10px; width: 100%; }
        .audit-card { background: #FFF; border-radius: 20px; padding: 35px; border: 1px solid var(--border); box-shadow: var(--shadow-premium); display: flex; flex-direction: column; gap: 15px;}
        
        .site-footer { padding: 40px; text-align: center; color: var(--text-sub); font-size: 0.85rem; border-top: 1px solid var(--border); width: 100%; opacity: 0; transition: opacity 0.8s; }
        .show-content .site-footer { opacity: 1; }
        .footer-links { margin-bottom: 15px; display: flex; justify-content: center; gap: 20px; }
        .footer-links a { color: var(--text-main); text-decoration: none; font-weight: 700; cursor: pointer; }

        @media (max-width: 600px) {
            #loader-overlay { display: none !important; }
            .input-row { flex-direction: column; }
            .input-field { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

        </svg>
    </div>

    <main>
        <div class="brand-header">
            <h1 class="brand-name">Snexz</h1>
        </div>
        <p class="tagline">The fastest way to discover what tools to use for your business.</p>
        
        <div class="search-container" id="search-container">
            <div class="input-cluster">
                <div class="input-row">
                    <div class="input-field">
                        <label>Your Industry</label>
                        <select id="industry-select" required>
                            <option value="" disabled selected>Select an industry...</option>
                            <option value="ecommerce">E-Commerce & Retail</option>
                            <option value="agency">Agency / Consulting</option>
                            <option value="saas">Software (SaaS)</option>
                            <option value="creators">Creators & Influencers</option>
                            <option value="local">Local Service Business</option>
                            <option value="health">Healthcare / Wellness</option>
                        </select>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-field">
                        <label>Primary Goal</label>
                        <select id="goal-select" required>
                            <option value="" disabled selected>What are you trying to do?</option>
                            <option value="marketing">Automate Marketing & Lead Gen</option>
                            <option value="sales">Manage Sales & CRM</option>
                            <option value="operations">Streamline Operations & HR</option>
                            <option value="finance">Handle Billing & Finance</option>
                            <option value="support">Improve Customer Support</option>
                            <option value="website">Build an App or Website</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="tech-specs-grid">
                <label class="tech-toggle">
                    <input type="checkbox" id="budget-friendly">
                    <span>Budget Friendly</span>
                </label>
                <label class="tech-toggle">
                    <input type="checkbox" id="enterprise-grade">
                    <span>Enterprise Grade</span>
                </label>
                <label class="tech-toggle">
                    <input type="checkbox" id="ai-features">
                    <span>AI Features</span>
                </label>
            </div>
            
            <button class="btn-audit" onclick="startAudit()">Find My Software</button>
            
            <div class="progress-wrapper" id="progress-wrapper">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </div>

        <div id="result-area">
            <div class="audit-card">
                <h2 id="top-pick-name">Loading...</h2>
                <p id="top-pick-desc">Recommendation goes here.</p>
                <button onclick="resetSearch()">New Search</button>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a onclick="openModal('about')">About</a>
            <a onclick="openModal('privacy')">Privacy</a>
            <a onclick="openModal('terms')">Terms</a>
        </div>
        <div>&copy; 2026 Snexz.</div>
    </footer>

    <!-- KILL SWITCH: THIS REMOVES THE LOADER -->
    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader-overlay');
            setTimeout(() => {
                loader.style.opacity = '0';
                document.body.classList.add('show-content');
                setTimeout(() => { 
                    loader.style.display = 'none'; 
                }, 500);
            }, 1500); 
        });

        function startAudit() {
            const ind = document.getElementById('industry-select').value;
            const goal = document.getElementById('goal-select').value;
            if(!ind || !goal) return alert('Select options first');
            
            document.querySelector('.btn-audit').style.display = 'none';
            document.getElementById('progress-wrapper').style.display = 'block';
            let w = 0;
            const bar = document.getElementById('progress-bar');
            const iv = setInterval(() => {
                w += 10;
                bar.style.width = w + '%';
                if(w >= 100) {
                    clearInterval(iv);
                    document.getElementById('search-container').style.display = 'none';
                    document.getElementById('result-area').style.display = 'block';
                    document.getElementById('top-pick-name').innerText = "Klaviyo";
                    document.getElementById('top-pick-desc').innerText = "Best fit for " + ind + " goals.";
                }
            }, 200);
        }

        function resetSearch() {
            location.reload();
        }

        function openModal(t) { alert(t + " info coming soon."); }
    </script>
</body>
</html>
